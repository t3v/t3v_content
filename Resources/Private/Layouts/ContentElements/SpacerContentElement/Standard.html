<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
  <f:switch expression="{settings.type}">
    <f:case value="custom">
      <f:if condition="{settings.customHeight}">
        <f:then>
          <hr id="c{data.uid}" class="t3v-content-spacer-content-element--custom t3v-content-spacer-content-element content-element" style="height: {settings.customHeight}px;" />
        </f:then>

        <f:else>
          <hr id="c{data.uid}" class="t3v-content-spacer-content-element--custom t3v-content-spacer-content-element content-element" />
        </f:else>
      </f:if>
    </f:case>

    <f:case default="true">
      <hr id="c{data.uid}" class="t3v-content-spacer-content-element--{settings.type} t3v-content-spacer-content-element content-element" />
    </f:case>
  </f:switch>
</html>
